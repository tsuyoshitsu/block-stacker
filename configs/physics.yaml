# Physics simulation configuration.

simulation:
  internal_rate_hz: 240
  solver_iterations: 100
  use_split_impulse: true

gravity: [0.0, 0.0, -9.81]

friction:
  block_to_block: 0.45           # 0.6 → 0.45 (×0.75): ブロック間固着緩和
  block_to_ground: 0.5           # 0.8 → 0.5: ブロックと地面の摩擦を下げて滑りやすく
  block_to_wall: 0.4
  rolling_friction: 0.001
  spinning_friction: 0.001

restitution:
  block: 0.1
  ground: 0.1
  wall: 0.3

damping:
  linear: 0.1
  angular: 0.1

contact:
  # 接触をより硬く（ペナルティ式ソフト接触の沈み込みを浅く）。
  # 角の刺さり対策: 実測で積み上げ時の最大貫通 0.33mm→0.09mm。貫通押し戻し
  # (splitImpulsePenetrationThreshold=-0.02) は据え置きで、押し戻し後に settle で再静定する。
  # 物理が変わるので学習し直し推奨。不安定なら stiffness を下げる。
  stiffness: 40000
  damping: 400

sleep_detection:
  linear_velocity_threshold: 0.01
  angular_velocity_threshold: 0.05
  stable_frames_required: 30        # at internal_rate_hz

collapse_detection:
  # 崩落判定パラメータ（PhysicsConfig.collapse_dispersion_ratio / collapse_cooldown）。
  # 条件: タワー高さが H_low 以下 かつ 旧タワーの tower_dispersion_ratio 以上が散布に戻った場合。
  # 設計書 §物理 / env.py _is_collapse() を参照。
  tower_dispersion_ratio: 0.5       # 旧タワーのうち散布に戻った割合の閾値
  cooldown_after_collapse: 2.0      # 崩落後の再判定クールダウン（秒）

carrier_constraint:
  type: "point2point"
  max_force: 8.0
  trajectory_speed: 0.3             # m/s during transport
  approach_height_offset: 0.05      # m, lift before horizontal move
